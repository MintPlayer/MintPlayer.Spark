name: pull-request

on:
  pull_request:
    branches: [ master ]

env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:

    name: pull-request
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0  # nx affected needs git history to compute base SHA

    - name: Derive base SHA for nx affected
      uses: nrwl/nx-set-shas@v4

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.100
        # Authenticates packages to push to GPR
        source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      env:
        NUGET_AUTH_TOKEN: '%NUGET_AUTH_TOKEN%'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install npm dependencies
      run: npm ci

    - name: Build ng-spark
      run: dotnet build node_packages/ng-spark/ng-spark.esproj --configuration Release

    - name: Build ng-spark-auth
      run: dotnet build node_packages/ng-spark-auth/ng-spark-auth.esproj --configuration Release

    - name: dotnet restore
      run: dotnet restore
      env:
        NUGET_AUTH_TOKEN: ${{ github.token }}

    - name: Resolve Playwright version
      id: playwright
      run: |
        version=$(grep -oE 'Microsoft\.Playwright"[[:space:]]*Version="[^"]+"' MintPlayer.Spark.E2E.Tests/MintPlayer.Spark.E2E.Tests.csproj \
          | grep -oE 'Version="[^"]+"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "Playwright version: ${version}"

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    # Run build before tests so Angular-app build failures (e.g., broken
    # imports, type errors, budget overruns) block the PR. The .NET test
    # target already dependsOn build, but the demo Angular apps
    # (@spark-demo/{demo-app,fleet-demo,hr-demo,webhooks-demo}) don't have
    # a test target — without this step their build is never exercised in
    # CI, and the next deploy run is the first thing to notice.
    - name: Build affected projects (Nx)
      run: npx nx affected --target=build

    - name: Run affected tests (.NET + Angular via Nx)
      run: npx nx affected --target=test
      env:
        # NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}  # Nx Cloud disabled — using self-hosted cache (see workflow-level env)
        RAVENDB_LICENSE: ${{ secrets.RAVENDB_LICENSE }}

    # One codecov upload per test project, each tagged with its own flag.
    # codecov.yml has `carryforward: true` on every flag — when nx affected
    # skips a project on a given PR, codecov reuses that flag's last-known
    # coverage instead of treating the missing lines as uncovered. That
    # keeps `codecov/project` accurate on test-only / single-suite PRs.
    # Each step gates on the presence of the corresponding coverage file
    # (nx affected may have skipped the project, leaving no file) so a
    # missing file is a no-op rather than a failure.
    - name: Upload coverage (unit)
      if: always() && hashFiles('MintPlayer.Spark.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.Tests/coverage/**/coverage.cobertura.xml
        flags: unit
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (sourcegen)
      if: always() && hashFiles('MintPlayer.Spark.SourceGenerators.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.SourceGenerators.Tests/coverage/**/coverage.cobertura.xml
        flags: sourcegen
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (client)
      if: always() && hashFiles('MintPlayer.Spark.Client.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.Client.Tests/coverage/**/coverage.cobertura.xml
        flags: client
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (e2e)
      if: always() && hashFiles('MintPlayer.Spark.E2E.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.E2E.Tests/coverage/**/coverage.cobertura.xml
        flags: e2e
        fail_ci_if_error: false
        verbose: true
