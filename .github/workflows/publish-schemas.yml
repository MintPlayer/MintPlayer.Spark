name: publish-schemas

on:
  push:
    branches: [ master ]
    paths:
      - 'Schemas/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-and-push-schemas
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract tags/labels
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          github-token: ${{ github.token }}
          images: ghcr.io/mintplayer/spark-json-schemas

      - name: Build and push to GHCR
        id: push-ghcr
        uses: docker/build-push-action@v6
        with:
          context: ./Schemas
          file: ./Schemas/Dockerfile
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/mintplayer/spark-json-schemas
          subject-digest: ${{ steps.push-ghcr.outputs.digest }}
          push-to-registry: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            mkdir -p /var/www/spark-json-schemas
            cd /var/www/spark-json-schemas

            # Download latest docker-compose.yml from the repository
            rm -f docker-compose.yml
            curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/master/Schemas/docker-compose.yml

            # Log in to GHCR using the workflow's GITHUB_TOKEN
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker compose pull

            # Stop and remove old containers
            docker compose down

            # Start new containers
            docker compose up -d

            # Clean up old images
            docker image prune -f
