name: publish-release

on:
  push:
    branches:
      - 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}

jobs:
  build:
    name: publish-release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.100
        # Authenticates packages to push to GPR
        source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      env:
        NUGET_AUTH_TOKEN: '%NUGET_AUTH_TOKEN%'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install npm dependencies
      run: npm ci

    - name: Build ng-spark
      run: dotnet build node_packages/ng-spark/ng-spark.esproj --configuration Release

    - name: Build ng-spark-auth
      run: dotnet build node_packages/ng-spark-auth/ng-spark-auth.esproj --configuration Release

    - name: Install dependencies
      run: dotnet restore
      env:
        NUGET_AUTH_TOKEN: ${{ github.token }}

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Resolve Playwright version
      id: playwright
      run: |
        version=$(grep -oE 'Microsoft\.Playwright"[[:space:]]*Version="[^"]+"' MintPlayer.Spark.E2E.Tests/MintPlayer.Spark.E2E.Tests.csproj \
          | grep -oE 'Version="[^"]+"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    # Per-project test invocation so each coverage file lands at
    # `{ProjectName}/coverage/{guid}/coverage.cobertura.xml` — matches the layout
    # nx produces on PRs, and matches the glob pattern each flagged codecov
    # upload step below uses.
    - name: Test
      run: |
        set -e
        for proj in \
          MintPlayer.Spark.Tests \
          MintPlayer.Spark.SourceGenerators.Tests \
          MintPlayer.Spark.Client.Tests \
          MintPlayer.Spark.E2E.Tests; do
          echo "::group::dotnet test ${proj}"
          dotnet test "${proj}" \
            --no-restore \
            --configuration Release \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory "${proj}/coverage"
          echo "::endgroup::"
        done
      env:
        RAVENDB_LICENSE: ${{ secrets.RAVENDB_LICENSE }}

    - name: Test Angular libraries
      run: npx nx run-many --target=test --projects=@mintplayer/ng-spark,@mintplayer/ng-spark-auth

    # Master runs every test project unconditionally — all four coverage files
    # are present. Each uploads under its own flag so codecov's carryforward
    # logic has a full, fresh baseline to serve to PRs where `nx affected`
    # skipped one or more projects. See codecov.yml `flag_management`.
    - name: Upload coverage (unit)
      if: always() && hashFiles('MintPlayer.Spark.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.Tests/coverage/**/coverage.cobertura.xml
        flags: unit
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (sourcegen)
      if: always() && hashFiles('MintPlayer.Spark.SourceGenerators.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.SourceGenerators.Tests/coverage/**/coverage.cobertura.xml
        flags: sourcegen
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (client)
      if: always() && hashFiles('MintPlayer.Spark.Client.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.Client.Tests/coverage/**/coverage.cobertura.xml
        flags: client
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage (e2e)
      if: always() && hashFiles('MintPlayer.Spark.E2E.Tests/coverage/**/coverage.cobertura.xml') != ''
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: MintPlayer.Spark.E2E.Tests/coverage/**/coverage.cobertura.xml
        flags: e2e
        fail_ci_if_error: false
        verbose: true

    - name: Pack
      run: dotnet pack --no-build --configuration Release /p:ContinuousIntegrationBuild=true

    - name: PushNuget
      run: dotnet nuget push **/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.PUBLISH_TO_NUGET_ORG }} --skip-duplicate

    - name: PushGithub
      run: dotnet nuget push **/*.nupkg --no-symbols --skip-duplicate
      env:
        NUGET_AUTH_TOKEN: ${{ github.token }}

    - name: Push ng-spark to NPM
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'node_packages/ng-spark/dist/package.json'
        registry: 'https://registry.npmjs.org'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        access: 'public'
        provenance: true

    - name: Push ng-spark to Github
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'node_packages/ng-spark/dist/package.json'
        registry: 'https://npm.pkg.github.com'
        token: ${{ github.token }}
        access: 'public'
        provenance: true

    - name: Push ng-spark-auth to NPM
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'node_packages/ng-spark-auth/dist/package.json'
        registry: 'https://registry.npmjs.org'
        token: ${{ secrets.PUBLISH_TO_NPMJS }}
        access: 'public'
        provenance: true

    - name: Push ng-spark-auth to Github
      uses: JS-DevTools/npm-publish@v4
      with:
        package: 'node_packages/ng-spark-auth/dist/package.json'
        registry: 'https://npm.pkg.github.com'
        token: ${{ github.token }}
        access: 'public'
        provenance: true
