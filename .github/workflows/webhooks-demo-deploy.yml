name: webhooks-demo-deploy

on:
  push:
    branches:
      - master
    paths:
      - 'Demo/WebhooksDemo/**'
      - 'libs/spark/MintPlayer.Spark/**'
      - 'libs/spark/MintPlayer.Spark.Abstractions/**'
      - 'libs/messaging/MintPlayer.Spark.Messaging/**'
      - 'libs/messaging/MintPlayer.Spark.Messaging.Abstractions/**'
      - 'libs/subscription_worker/MintPlayer.Spark.SubscriptionWorker/**'
      - 'libs/source_generators/MintPlayer.Spark.SourceGenerators/**'
      - 'libs/webhooks/MintPlayer.Spark.Webhooks.GitHub/**'
      - 'libs/webhooks/MintPlayer.Spark.Webhooks.GitHub.DevTunnel/**'
      - 'libs/socket_extensions/MintPlayer.Dotnet.SocketExtensions/**'
      # Angular libraries baked into the image via `nx run @spark-demo/webhooks-demo:build`.
      - 'libs/node_packages/ng-spark/**'
      - 'libs/node_packages/ng-spark-auth/**'
      # Workspace-level files that affect the build (lockfile, Nx config, base tsconfig).
      - 'package.json'
      - 'package-lock.json'
      - 'nx.json'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/webhooks-demo
  APP_NAME: webhooks-demo
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: ${{ secrets.NX_CACHE_SERVER }}
  NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: ${{ (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) && secrets.NX_CACHE_RW_TOKEN || secrets.NX_CACHE_RO_TOKEN }}


jobs:
  build-and-push:

    name: Build and push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    # No host .NET/Node setup needed: the Dockerfile's `build` stage runs
    # `dotnet restore`, `npm ci`, `nx run @spark-demo/webhooks-demo:build`,
    # and `dotnet build`/`publish` inside the container. Build failures are
    # already gated upstream by `pull-request.yml` (pre-merge) and
    # `dotnet-build-master.yml` (post-merge, runs in parallel with this job).
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Authenticate with GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Extract tags/labels
      id: meta-ghcr
      uses: docker/metadata-action@v6
      with:
        github-token: ${{ github.token }}
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    # No Nx remote-cache build-args/secrets are passed into the Docker build
    # by design: the Dockerfile uses `--skip-nx-cache` so the deployed image
    # is always rebuilt from the source files in the build context, never
    # replayed from a cache entry. See docs/guide-nx-remote-cache.md.
    - name: Build and push Docker image
      id: push-ghcr
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Demo/WebhooksDemo/WebhooksDemo/Dockerfile
        push: true
        tags: ${{ steps.meta-ghcr.outputs.tags }}
        labels: ${{ steps.meta-ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate artifact attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        subject-digest: ${{ steps.push-ghcr.outputs.digest }}
        push-to-registry: true

  deploy:

    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: read

    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.2.5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        passphrase: ${{ secrets.VPS_SSH_KEY_PASSPHRASE }}
        envs: GITHUB_TOKEN
        script: |
          mkdir -p /var/www/${{ env.APP_NAME }}
          cd /var/www/${{ env.APP_NAME }}

          # Download latest docker-compose.yml from the repository
          rm -f docker-compose.yml
          curl -sf -H "Authorization: token $GITHUB_TOKEN" -o docker-compose.yml \
            https://raw.githubusercontent.com/${{ github.repository }}/master/Demo/WebhooksDemo/docker-compose.yml

          # Log in to GHCR
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull latest image and restart
          docker compose pull
          docker compose down
          docker compose up -d

          # Clean up old images
          docker image prune -f
