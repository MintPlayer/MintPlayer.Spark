services:

  spark-raven:
    # Pinned to a specific patch (over `7.1-latest`, which moves) so a future
    # major-revision refresh can't surprise the on-disk format / settings.json
    # layout. Bump deliberately when you've tested an upgrade.
    image: docker.io/ravendb/ravendb:7.1.7-ubuntu.22.04-x64
    environment:
      - RAVEN_Setup_Mode=None
      - RAVEN_Security_UnsecuredAccessAllowed=PublicNetwork
      - RAVEN_ServerUrl=http://0.0.0.0:8080
    volumes:
      # ravendb:7.1-latest sets RAVEN_DataDir=/var/lib/ravendb/data; mounting the
      # legacy /opt/RavenDB/Server/RavenData path silently lost data on every
      # container recreate.
      - raven-data:/var/lib/ravendb/data
    networks:
      - web
    restart: unless-stopped

  spark-app:
    image: ghcr.io/mintplayer/mintplayer.spark/webhooks-demo:master
    depends_on:
      - spark-raven
    environment:
      - Spark__RavenDB__Urls__0=http://spark-raven:8080
      - Spark__RavenDb__EnsureDatabaseCreated=true
      - GitHub__WebhookSecret=${GITHUB_WEBHOOK_SECRET}
      - GitHub__Production__AppId=${GITHUB_PRODUCTION_APP_ID}
      - GitHub__Production__ClientId=${GITHUB_APP_CLIENT_ID}
      - GitHub__Production__ClientSecret=${GITHUB_APP_CLIENT_SECRET}
      - GitHub__Production__PrivateKeyPath=/run/secrets/github-app.pem
      - GitHub__Development__AppId=${GITHUB_DEVELOPMENT_APP_ID}
    volumes:
      - ./github-app.pem:/run/secrets/github-app.pem:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.spark-webhooks.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.spark-webhooks.entrypoints=websecure"
      - "traefik.http.routers.spark-webhooks.tls.certresolver=letsencrypt"
    networks:
      - web
    restart: unless-stopped

volumes:
  raven-data:

networks:
  web:
    external: true
